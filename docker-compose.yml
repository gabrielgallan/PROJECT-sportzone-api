services:
  postgres:
    container_name: sportzone-pg
    image: bitnami/postgresql
    ports:
      - 5432:5432
    environment:
      - POSTGRESQL_USERNAME=docker
      - POSTGRESQL_PASSWORD=docker
      - POSTGRESQL_DATABASE=sportzone

  redis:
    container_name: sportzone-redis
    image: redis
    ports:
      - 6379:6379